name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src tests

      - name: Run tests
        env:
          DEMO_MODE: "true"
          LLM_MOCK: "true"
          CRM_MOCK: "true"
        run: pytest --cov=src --cov-report=term-missing --cov-fail-under=70 -v
